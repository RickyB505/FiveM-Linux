name: Build FiveM

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    defaults:
      run:
        shell: cmd

    steps:
      - name: Clone FiveM repository
        run: |
          git clone https://github.com/Gogsi/fivem.git -b wine-win10 -c core.symlinks=true
          cd fivem
          git submodule update --jobs=16 --init

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install setuptools
        run: |
          py -m pip install --upgrade pip
          py -m pip install setuptools

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Yarn
        run: npm install -g yarn

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          location: C:\msys64
          update: true
          install: >-
            git
            make
            mingw-w64-x86_64-gcc

      - name: Setup Visual Studio environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install JS dependencies
        run: |
          cd fivem
          yarn install

      - name: Download Chrome
        run: |
          cd fivem
          fxd get-chrome

      - name: Prebuild natives
        run: |
          cd fivem
          prebuild

      - name: Generate build files
        run: |
          cd fivem
          fxd gen -game five

      - name: Generate Visual Studio solution
        run: |
          cd fivem
          fxd vs -game five

      - name: Build FiveM
        run: |
          cd fivem
          msbuild code\premake5-built.sln /m /p:Configuration=Release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fivem-build
          path: |
            fivem\code\bin\
            fivem\out\
